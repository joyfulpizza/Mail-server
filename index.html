<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동규의 gmail 보내기</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      margin-top: 60px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      width: 320px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      font-size: 14px;
    }

    textarea {
      height: 100px;
      resize: none;
    }

    button {
      margin-top: 10px;
      padding: 12px;
      width: 100%;
      font-size: 16px;
      background: #4285F4;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>동규의 gmail 보내기</h1>

  <div class="box">
    <input id="name" placeholder="name">
    <input id="title" placeholder="title">
    <textarea id="message" placeholder="message"></textarea>

    <button id="sendBtn" onclick="sendMail()">보내기</button>

    <p id="status"></p>
  </div>

  <script>
    const API_URL = "https://mail-by-leedongyou.onrender.com/send";

    async function sendMail() {
      const btn = document.getElementById("sendBtn");
      const status = document.getElementById("status");

      const name = document.getElementById("name").value.trim();
      const title = document.getElementById("title").value.trim();
      const message = document.getElementById("message").value.trim();

      if (!name || !title || !message) {
        status.innerText = "모든 입력을 채워주세요";
        return;
      }

      btn.disabled = true;
      status.innerText = "전송 중...";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ name, title, message })
        });

        const data = await res.json();

        if (res.status === 429) {
          status.innerText = data.message;
        } else if (data.success) {
          status.innerText = "메일 전송 완료!";
        } else {
          status.innerText = data.message || "오류 발생";
        }
      } catch (e) {
        status.innerText = "서버 연결 실패";
      }

      setTimeout(() => {
        btn.disabled = false;
      }, 2000);
    }
  </script>

</body>
</html>
